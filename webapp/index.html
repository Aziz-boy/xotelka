<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NOIR BOX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ══ HEADER ══ -->
<header class="nb-header">
  <div class="nb-logo">
    <svg viewBox="0 0 100 115" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M50 108 L8 70 L20 30 L50 12 L80 30 L92 70 Z" stroke="white" stroke-width="1.8" stroke-linejoin="round" fill="none"/>
      <line x1="8"  y1="70" x2="92" y2="70"  stroke="white" stroke-width="1.2"/>
      <line x1="50" y1="12" x2="8"  y2="70"  stroke="white" stroke-width="1.2"/>
      <line x1="50" y1="12" x2="92" y2="70"  stroke="white" stroke-width="1.2"/>
      <line x1="50" y1="70" x2="50" y2="108" stroke="white" stroke-width="1.2"/>
      <line x1="20" y1="30" x2="92" y2="70"  stroke="white" stroke-width="0.9"/>
      <line x1="80" y1="30" x2="8"  y2="70"  stroke="white" stroke-width="0.9"/>
      <polygon points="50,14 63,21 68,34 62,47 50,51 38,47 32,34 37,21" fill="none" stroke="white" stroke-width="1.2"/>
      <polygon points="50,19 61,25 65,34 59,43 50,46 41,43 35,34 39,25" fill="none" stroke="white" stroke-width="1.0"/>
      <polygon points="50,24 58,29 62,34 57,40 50,42 43,40 38,34 42,29" fill="none" stroke="white" stroke-width="0.8"/>
      <polygon points="50,29 56,32 58,35 55,39 50,41 45,39 42,35 44,32" fill="none" stroke="white" stroke-width="0.6"/>
      <circle cx="50" cy="34" r="2.5" fill="none" stroke="white" stroke-width="0.5"/>
    </svg>
  </div>
  <div class="nb-brand">
    <h1 class="nb-title">NOIR BOX</h1>
    <p class="nb-tagline">sezdirmasdan sevadiganlar uchun</p>
  </div>
</header>

<!-- ══ ACTIVE ORDER BANNER ══ -->
<div class="order-banner" id="order-banner" onclick="openStatusModal()">
  <div class="ob-info">
    <span class="ob-dot" id="ob-dot"></span>
    <div>
      <div class="ob-heading">Faol buyurtma</div>
      <div class="ob-status-txt" id="ob-status-txt">Yuklanmoqda...</div>
    </div>
  </div>
  <span class="ob-id" id="ob-id"></span>
  <span class="ob-arrow">›</span>
</div>

<!-- ══ CATALOG ══ -->
<main class="nb-catalog">
  <div class="catalog-label">Kolleksiyalar</div>
  <div class="boxes-grid" id="boxes-grid"></div>
</main>

<!-- ══ BOX DETAIL MODAL ══ -->
<div class="modal-overlay" id="box-modal-overlay" onclick="closeBoxModal()"></div>
<div class="modal-sheet" id="box-modal" role="dialog">
  <div class="modal-handle"></div>
  <button class="modal-close" onclick="closeBoxModal()" aria-label="Yopish">✕</button>

  <div class="modal-scroll">
    <div class="modal-hero">
      <div class="modal-hero-img" id="modal-hero-img"></div>
      <div class="modal-hero-overlay">
        <div class="modal-badge" id="modal-badge"></div>
        <h2 class="modal-name" id="modal-name"></h2>
        <p class="modal-tagline-txt" id="modal-tagline-txt"></p>
      </div>
    </div>

    <div class="modal-body">
      <div class="items-section-title">Qutida nima bor:</div>
      <div class="modal-items" id="modal-items"></div>
    </div>
  </div>

  <div class="modal-footer">
    <div class="modal-price" id="modal-price"></div>
    <button class="btn-red" id="btn-add-cart" onclick="addToCart()">Korzinaga qo'shish</button>
  </div>
</div>

<!-- ══ CHECKOUT MODAL ══ -->
<div class="modal-overlay" id="checkout-overlay" onclick="closeCheckout()"></div>
<div class="modal-sheet checkout-sheet" id="checkout-modal" role="dialog">
  <div class="modal-handle"></div>
  <div class="checkout-header">
    <h3 class="checkout-title">Buyurtma berish</h3>
    <button class="modal-close static" onclick="closeCheckout()">✕</button>
  </div>

  <div class="checkout-scroll">
    <div class="checkout-summary" id="checkout-summary"></div>

    <div class="form-section">
      <div class="form-group">
        <label class="form-label">Ismingiz</label>
        <input class="form-input" id="senderName" type="text" placeholder="Jasur">
      </div>
      <div class="form-group">
        <label class="form-label">Qabul qiluvchi ismi</label>
        <input class="form-input" id="recipientName" type="text" placeholder="Malika">
      </div>
      <div class="form-group">
        <label class="form-label">Telefon raqami</label>
        <input class="form-input" id="recipientPhone" type="tel" placeholder="+998 90 123 45 67">
      </div>
      <div class="form-group">
        <label class="form-label">Yetkazish manzili</label>
        <input class="form-input" id="recipientAddress" type="text" placeholder="Ko'cha, uy, kvartira...">
      </div>
      <div class="form-group">
        <label class="form-label">Yetkazish sanasi</label>
        <input class="form-input" id="deliveryDate" type="date">
      </div>
      <div class="form-group">
        <label class="form-label">Maxfiy xabar <span class="optional">(ixtiyoriy)</span></label>
        <textarea class="form-textarea" id="message" placeholder="Sevgilim, seni juda yaxshi ko'raman..."></textarea>
      </div>
    </div>
  </div>

  <div class="modal-footer">
    <button class="btn-red full-width" id="btn-place-order" onclick="placeOrder()">Buyurtma berish</button>
  </div>
</div>

<!-- ══ STATUS MODAL ══ -->
<div class="modal-overlay" id="status-overlay" onclick="closeStatusModal()"></div>
<div class="modal-sheet" id="status-modal" role="dialog">
  <div class="modal-handle"></div>
  <div class="checkout-header">
    <h3 class="checkout-title">Buyurtma holati</h3>
    <button class="modal-close static" onclick="closeStatusModal()">✕</button>
  </div>
  <div class="status-scroll">
    <div class="status-meta" id="status-meta"></div>
    <div class="tl-section-label">JARAYON</div>
    <div class="timeline" id="timeline"></div>
  </div>
  <div class="modal-footer" id="status-footer" style="display:none"></div>
</div>

<!-- ══ SUCCESS OVERLAY ══ -->
<div class="success-overlay" id="success-overlay">
  <div class="success-content">
    <div class="success-icon">
      <svg viewBox="0 0 64 64" fill="none">
        <circle cx="32" cy="32" r="30" stroke="white" stroke-width="1.5"/>
        <path d="M20 32 L28 40 L44 24" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h2 class="success-title">Buyurtma qabul qilindi</h2>
    <p class="success-sub">To'lov amalga oshirgach, chekni Telegram botga rasm sifatida yuboring.</p>
    <div class="success-order-id" id="success-order-id"></div>
    <button class="btn-red" id="btn-send-receipt" onclick="sendReceipt()" style="margin-top:20px;width:100%;padding:15px">
      To'lov chekini yuborish
    </button>
    <button onclick="closeSuccess()" style="margin-top:10px;width:100%;padding:12px;background:none;border:none;color:var(--neutral);font-family:var(--sans);font-size:13px;cursor:pointer;letter-spacing:0.5px">
      Keyinroq
    </button>
  </div>
</div>

<!-- ══ CART BAR ══ -->
<div class="cart-bar" id="cart-bar">
  <div class="cart-info">
    <div class="cart-icon-wrap" id="cart-icon-wrap">
      <svg class="cart-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 01-8 0"/>
      </svg>
      <span class="cart-count" id="cart-count">0</span>
    </div>
    <div class="cart-details">
      <span class="cart-items-label" id="cart-items-label">0 ta mahsulot</span>
      <span class="cart-total" id="cart-total">0 so'm</span>
    </div>
  </div>
  <button class="cart-cta" onclick="openCheckout()">Buyurtma berish</button>
</div>

<!-- ══ TOAST ══ -->
<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
